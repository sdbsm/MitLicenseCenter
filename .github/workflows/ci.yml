name: CI

# REL-14/REL-21 (MLC-124): paths-фильтры — backend-job не гоняется на чисто-frontend
# изменениях и наоборот; оба пропускаются на чисто-doc изменениях.
on:
  push:
    branches: ["**"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "SECURITY.md"
      - "LICENSE"
      - "THIRD_PARTY_LICENSES.txt"
      - "audit/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "SECURITY.md"
      - "LICENSE"
      - "THIRD_PARTY_LICENSES.txt"
      - "audit/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + test + format)
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: backend/global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj', 'backend/Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        working-directory: backend
        run: dotnet restore MitLicenseCenter.slnx

      - name: Build
        working-directory: backend
        run: dotnet build MitLicenseCenter.slnx -c Release --no-restore

      - name: Test
        working-directory: backend
        run: dotnet test MitLicenseCenter.slnx -c Release --no-build --filter "Category!=Smoke" --logger "trx;LogFileName=test-results.trx"

      - name: Format check
        working-directory: backend
        run: dotnet format MitLicenseCenter.slnx --verify-no-changes --severity warn

      # REL-14 (MLC-124): информационный аудит уязвимостей NuGet.
      # continue-on-error: true — не роняет сборку; выводит CVE в лог для ревью.
      - name: Vulnerability audit (dotnet list package --vulnerable)
        working-directory: backend
        run: dotnet list package --vulnerable --include-transitive
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/**/TestResults/*.trx
          if-no-files-found: ignore

  frontend:
    name: Frontend (lint + type-check + format + build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.13"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile
        env:
          CI: "true"

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      # REL-14 (MLC-124): проверка форматирования Prettier.
      # Скрипт format:check уже есть в frontend/package.json.
      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # REL-14 (MLC-124): информационный аудит уязвимостей npm/pnpm.
      # continue-on-error: true — не роняет сборку; выводит CVE в лог для ревью.
      - name: Vulnerability audit (pnpm audit)
        run: pnpm audit
        continue-on-error: true
